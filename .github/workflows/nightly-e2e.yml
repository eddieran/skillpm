name: nightly-e2e

on:
  schedule:
    - cron: "0 4 * * *"

jobs:
  e2e-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        lane:
          - integration
          - openclaw-clawhub
          - contract-probe
          - openapi-drift
          - resilience
          - rollback
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.1"
          cache: true
      - name: Run lane
        id: run-lane
        run: |
          set +e
          case "${{ matrix.lane }}" in
            integration)
              go test ./... -run Integration -count=1
              ;;
            openclaw-clawhub)
              SKILLPM_E2E_REAL_NETWORK=1 go test ./test/e2e -run 'TestRealNetworkInstallAndInject/ClawHub_Standard_Slug' -count=1 -timeout 10m -v
              ;;
            contract-probe)
              echo "Add probe for /.well-known/clawhub.json /.well-known/clawdhub.json /api/v1/search /api/v1/skills /api/v1/skills/{slug}/file /api/v1/download /api/v1/resolve"
              ;;
            openapi-drift)
              echo "Add openapi drift validation against /api/v1/openapi.json"
              ;;
            resilience)
              go test ./... -run RateLimit -count=1
              ;;
            rollback)
              go test ./... -run Rollback -count=1
              ;;
          esac
          EXIT_CODE=$?
          if [ $EXIT_CODE -eq 0 ]; then
            echo "result=pass" >> "$GITHUB_OUTPUT"
          else
            echo "result=fail" >> "$GITHUB_OUTPUT"
          fi
          exit $EXIT_CODE
      - name: Save lane result as JSON artifact
        if: always()
        run: |
          mkdir -p nightly-results
          cat > nightly-results/${{ matrix.lane }}.json <<EOJSON
          {
            "lane": "${{ matrix.lane }}",
            "result": "${{ steps.run-lane.outputs.result || 'fail' }}",
            "run_id": "${{ github.run_id }}",
            "run_number": "${{ github.run_number }}",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "ref": "${{ github.sha }}"
          }
          EOJSON
      - name: Upload lane result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-results-${{ matrix.lane }}
          path: nightly-results/${{ matrix.lane }}.json
          retention-days: 90
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: nightly-${{ matrix.lane }}
          path: |
            coverage.*
            *.log
          if-no-files-found: ignore

  summary:
    runs-on: ubuntu-latest
    needs: e2e-matrix
    if: always()
    steps:
      - name: Download all lane results
        uses: actions/download-artifact@v4
        with:
          pattern: nightly-results-*
          merge-multiple: true
          path: nightly-results

      - name: Produce nightly E2E summary
        run: |
          echo "## Nightly E2E Summary" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Run:** #${{ github.run_number }} | **Date:** $(date -u +%Y-%m-%d) | **Commit:** \`${GITHUB_SHA::8}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Lane | Result |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"

          TOTAL=0
          PASSED=0

          for f in nightly-results/*.json; do
            if [ ! -f "$f" ]; then
              echo "| _(no results found)_ | - |" >> "$GITHUB_STEP_SUMMARY"
              break
            fi

            LANE=$(python3 -c "import json; print(json.load(open('$f'))['lane'])")
            RESULT=$(python3 -c "import json; print(json.load(open('$f'))['result'])")
            TOTAL=$((TOTAL + 1))

            if [ "$RESULT" = "pass" ]; then
              PASSED=$((PASSED + 1))
              echo "| $LANE | :white_check_mark: pass |" >> "$GITHUB_STEP_SUMMARY"
            else
              echo "| $LANE | :x: fail |" >> "$GITHUB_STEP_SUMMARY"
            fi
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Result: $PASSED/$TOTAL lanes passed.**" >> "$GITHUB_STEP_SUMMARY"

          if [ "$PASSED" -eq "$TOTAL" ] && [ "$TOTAL" -gt 0 ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "> :white_check_mark: All lanes green. This counts toward the 3-consecutive-night release gate." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "> :warning: One or more lanes failed. The 3-consecutive-night release counter resets. See [CI Policy](../docs/ci-policy.md) for escalation process." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload consolidated results
        uses: actions/upload-artifact@v4
        with:
          name: nightly-results-consolidated
          path: nightly-results/
          retention-days: 90
